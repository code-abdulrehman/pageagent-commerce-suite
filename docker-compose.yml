services:
  postgres:
    image: postgres:16-alpine
    container_name: pageagent-commerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
      POSTGRES_DB: commerce
    ports:
      - "5432:5432"
    volumes:
      - commerce_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce -d commerce"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  commerce_pgdata:
